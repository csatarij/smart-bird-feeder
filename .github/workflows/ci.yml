name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Check style (ruff lint)
        run: ruff check .

      - name: Check formatting (ruff format)
        run: ruff format --check .

  test:
    name: Tests
    # Currently runs on ubuntu-latest for speed and availability.
    # The unit tests mock all Pi hardware (frames are NumPy arrays, picamera2 is
    # lazy-imported with a try/except), so the OS difference does not affect results.
    #
    # To test on real Raspberry Pi hardware instead, register a self-hosted runner:
    #   https://docs.github.com/en/actions/hosting-your-own-runners
    # Then replace 'ubuntu-latest' below with: [self-hosted, raspberry-pi]
    # And replace the pip install step with: sudo bash setup.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # opencv-python-headless is the pip equivalent of the Pi's apt python3-opencv.
        # picamera2 is never imported at module level, so it is safe to skip here.
        run: pip install -r requirements.txt opencv-python-headless numpy

      - name: Run tests
        run: pytest -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Scan for security issues
        # -ll: medium and high severity only (skips low-noise warnings)
        # --exclude: skip venv, data, and downloaded models
        run: bandit -r . --exclude ./.git,./venv,./data,./models -ll

  gate:
    name: Merge Gate
    if: always()
    needs: [lint, test, security]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ||
                "${{ needs.test.result }}" != "success" ||
                "${{ needs.security.result }}" != "success" ]]; then
            echo "One or more required jobs failed."
            exit 1
          fi
