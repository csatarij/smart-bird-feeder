# Smart Bird Feeder Configuration
# Adjust these values to match your hardware setup and environment.

camera:
  # "picamera" for Raspberry Pi Camera Module, "usb" for USB webcam
  type: "picamera"
  # Pi Camera v2 (IMX219) native maximum: 3280x2464
  resolution_width: 3280
  resolution_height: 2464
  framerate: 10
  # Rotation in degrees (0, 90, 180, 270)
  rotation: 0
  # Warm-up time in seconds (let the camera adjust exposure)
  warmup_seconds: 3

motion:
  # Region of Interest — crop area around the feeder (x, y, width, height as fractions 0.0-1.0)
  # This is the ONLY area the system ever analyzes or saves. Everything outside is discarded.
  # Adjust to frame just your bird feeder.
  roi:
    x: 0.1
    y: 0.1
    width: 0.8
    height: 0.8
  # Minimum percentage of ROI pixels that must change to trigger a capture
  sensitivity_percent: 3.0
  # Minimum seconds between captures (prevents burst-saving the same bird)
  cooldown_seconds: 10
  # Gaussian blur kernel size for noise reduction (must be odd)
  blur_kernel: 21
  # Threshold for pixel difference (0-255)
  diff_threshold: 30

classifier:
  # Path to TFLite model and labels
  model_path: "models/bird_model.tflite"
  labels_path: "models/bird_labels.txt"
  # Minimum confidence score to accept a classification (0.0-1.0)
  confidence_threshold: 0.3
  # Input image size expected by the model
  input_size: 224
  # How often to check the capture queue (seconds)
  poll_interval: 5
  # Number of top predictions to store
  top_k: 3

storage:
  # Base data directory
  data_dir: "data"
  captures_dir: "data/captures"
  classified_dir: "data/classified"
  archive_dir: "data/archive"
  stats_dir: "data/stats"
  database_path: "data/birds.db"
  # Maximum disk usage for photos in MB (oldest are pruned first).
  # With a 64GB SD card you have plenty of room.
  max_storage_mb: 50000
  # Keep only the best photo per visit (highest classification confidence)
  keep_best_only: false
  # Archive every capture before classification (for algorithm validation).
  # Copies each snapshot to data/archive/ with a companion .json predictions sidecar.
  # These originals are NOT moved when classification runs — they stay in archive forever
  # (subject to max_storage_mb pruning). Set false to disable.
  archive_captures: true

privacy:
  # Strip EXIF metadata from all saved images
  strip_exif: true
  # Apply Gaussian blur to areas outside the ROI (in case ROI doesn't perfectly crop)
  blur_outside_roi: true
  # Never save the full-frame image (only the ROI crop)
  crop_to_roi_only: true
  # Maximum image dimension for saved photos. Increased to 2048 to retain detail
  # from the Pi Camera v2 high-res captures (especially useful for algorithm validation).
  max_saved_dimension: 2048

github:
  # GitHub sync is disabled — photos are kept locally on the 64GB SD card.
  # You can manually copy data/classified/ and data/stats/ off the Pi as needed.
  # To re-enable, set enabled: true and configure repo_url.
  enabled: false
  repo_url: ""
  branch: "main"
  sync_photos: true
  sync_stats: true
  max_daily_uploads: 20
  commit_template: "Daily bird update: {date} — {count} sightings"

webserver:
  # Built-in photo browser — access from any device on the local network
  host: "0.0.0.0"
  port: 8080

power_monitoring:
  # Log CPU temperature and core voltage via vcgencmd (Raspberry Pi only).
  # Falls back to /sys/class/thermal for temperature if vcgencmd is unavailable.
  enabled: true
  # How often to record a measurement (seconds). 300 = every 5 minutes.
  interval_seconds: 300
  # CSV log file for the time-series data. Columns: timestamp, cpu_temp_c, core_volts_v, throttled
  log_file: "data/power_log.csv"
  # How many hours of history to display on the health dashboard
  history_hours: 24

logging:
  level: "INFO"
  file: "data/bird_feeder.log"
  # "daily" rotates at midnight (TimedRotatingFileHandler); "size" rotates by file size
  rotation: "daily"
  backup_count: 30    # Days of log files to keep (30-day retention)
  max_bytes: 10485760 # Only used when rotation is "size" (10MB per file)
